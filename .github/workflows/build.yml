name: жһ„е»әдёҺеҸ‘еёғе·ҘдҪңжөҒ

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/module/**'
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: жһ„е»әдёҺеҸ‘еёғ
    runs-on: ubuntu-latest
    steps:
      - name: жӢүеҸ–д»Јз Ғ
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: жӣҙж–°е№¶еҮҶеӨҮеҸҳйҮҸ
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          sed -i "s/^versionCode=.*/versionCode=$COMMIT_COUNT/" src/module/module.prop
          VERSION=$(grep '^version=' src/module/module.prop | cut -d= -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_ENV
          
          # е®ҡд№үеҢ…еҗҚ
          FULL_NAME="NetProxy_${VERSION}_${COMMIT_COUNT}.zip"
          LITE_NAME="NetProxy_${VERSION}_${COMMIT_COUNT}_lite.zip"
          MINI_NAME="NetProxy_${VERSION}_${COMMIT_COUNT}_mini.zip"
          
          echo "FULL_NAME=$FULL_NAME" >> $GITHUB_ENV
          echo "LITE_NAME=$LITE_NAME" >> $GITHUB_ENV
          echo "MINI_NAME=$MINI_NAME" >> $GITHUB_ENV

      - name: жү“еҢ…жЁЎеқ—
        run: |
          cd src/module
          # 1. е®Ңж•ҙеҢ… (е…ЁйғЁз»„д»¶)
          7z a -tzip -mx=9 "../../${{ env.FULL_NAME }}" .
          # 2. зІҫз®ҖеҢ… (жҺ’йҷӨ IPSET зӣёе…іж–Үд»¶)
          7z a -tzip -mx=9 "../../${{ env.LITE_NAME }}" . -x!"bin/IPSET-LKM/*" -x!"bin/ipset"
          # 3. зәҜи„ҡжң¬еҢ… (жҺ’йҷӨжүҖжңүдәҢиҝӣеҲ¶ж–Үд»¶)
          7z a -tzip -mx=9 "../../${{ env.MINI_NAME }}" . -x!"bin/sing-box" -x!"bin/proxylink" -x!"bin/ipset" -x!"bin/IPSET-LKM/*" -x!"bin/zashboard/*"
          cd ../..

      - name: еҸ‘йҖҒжЁЎеқ—еҲ° Telegram (еҲҶж”ҜжҺЁйҖҒ/жүӢеҠЁи§ҰеҸ‘)
        if: ${{ github.ref_type != 'tag' }}
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          CAPTION="жЁЎеқ—жһ„е»әжҲҗеҠҹйҖҡзҹҘ
          
          зүҲжң¬: \`${{ env.VERSION }}\` (build ${{ env.COMMIT_COUNT }})
          иҜҙжҳҺ:
          \`\`\`
          ${COMMIT_MSG:-"жүӢеҠЁи§ҰеҸ‘жҲ–ж— иҜҙжҳҺ"}
          \`\`\`

          [жҸҗдәӨи®°еҪ•](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          [жһ„е»әж—Ҙеҝ—](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          # еҸ‘йҖҒе®Ңж•ҙеҢ…
          curl -s -F "chat_id=${{ secrets.TG_CHAT_ID }}" -F "document=@${{ env.FULL_NAME }}" -F "message_thread_id=2275" -F "parse_mode=Markdown" -F "caption=$CAPTION" https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument

          # еҸ‘йҖҒзІҫз®ҖеҢ…
          curl -s -F "chat_id=${{ secrets.TG_CHAT_ID }}" -F "document=@${{ env.LITE_NAME }}" -F "message_thread_id=2275" -F "caption=lite: дёҚеҗ« IPSET й©ұеҠЁпјҢйҖӮз”ЁдәҺеҶ…ж ёе·ІеҶ…зҪ® IPSET зҡ„и®ҫеӨҮ" https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument

          # еҸ‘йҖҒзәҜи„ҡжң¬еҢ…
          curl -s -F "chat_id=${{ secrets.TG_CHAT_ID }}" -F "document=@${{ env.MINI_NAME }}" -F "message_thread_id=2275" -F "caption=mini: дёҚеҗ«дәҢиҝӣеҲ¶ж–Үд»¶е’Ң IPSET й©ұеҠЁпјҢйңҖиҮӘиЎҢж”ҫе…Ҙ sing-boxгҖҒproxylinkгҖҒzashboard зӯүз»„д»¶" https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument

      - name: еҸ‘еёғ GitHub Release (Tag и§ҰеҸ‘)
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v3
        with:
          body_path: .github/changelog.md
          files: |
            ${{ env.FULL_NAME }}
            ${{ env.LITE_NAME }}
            ${{ env.MINI_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: еҸ‘йҖҒ Release йҖҡзҹҘеҲ° Telegram (Tag и§ҰеҸ‘)
        if: ${{ github.ref_type == 'tag' }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          thread-id: 2343
          parse-mode: markdown
          message: |
            **ж–°зүҲжң¬еҸ‘еёғйҖҡзҹҘ**
            
            зүҲжң¬: `${{ github.ref_name }}`
            
            [жҹҘзңӢжӣҙж–°ж—Ҙеҝ—е№¶дёӢиҪҪ](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            
            **зӣҙжҺҘдёӢиҪҪ:**
            [е®Ңж•ҙеҢ…](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.FULL_NAME }})
            [зІҫз®ҖеҢ…](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.LITE_NAME }})
            [зәҜи„ҡжң¬еҢ…](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.MINI_NAME }})

      - name: еӨұиҙҘйҖҡзҹҘ
        if: ${{ failure() }}
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          thread-id: 2275
          parse-mode: markdown
          message: |
            **е·ҘдҪңжөҒжү§иЎҢеӨұиҙҘпјҒ**
            
            иҜҙжҳҺ:
            \`\`\`
            ${COMMIT_MSG:-"ж— "}
            \`\`\`

            [зӮ№еҮ»жҹҘзңӢжһ„е»әж—Ҙеҝ—](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
