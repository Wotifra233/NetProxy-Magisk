# 构建 VitePress 站点并部署到 GitHub Pages
name: 部署文档站到 Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个 Pages 部署，且不取消进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 构建文档
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: 配置 Pages
        uses: actions/configure-pages@v6

      - name: 安装依赖
        run: npm ci
        working-directory: docs

      - name: 用 VitePress 构建
        run: npm run build
        working-directory: docs

      - name: 上传站点产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    name: 部署
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
