# Dependabot 配置

version: 2
updates:
  # GitHub Actions（工作流与 composite action 引用的 actions）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "ci(deps)"

  # 文档站 (VitePress)
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docs(deps)"

  # WebUI (Vue + Vite)
  - package-ecosystem: "npm"
    directory: "/src/webui"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "webui(deps)"
